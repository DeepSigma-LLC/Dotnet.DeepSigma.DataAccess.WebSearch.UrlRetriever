# Minimal SearXNG instance for local live testing.
# Mounts searxng-settings.yml so JSON format is enabled (the default image
# ships with only HTML, which causes HTTP 403 on API requests).
#
# Usage:
#   docker compose up
#
# SearXNG will be available at http://localhost:8080.

services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng-livetest
    ports:
      - "8080:8080"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - BASE_URL=http://localhost:8080/
      - INSTANCE_NAME=searxng-livetest
    restart: unless-stopped
